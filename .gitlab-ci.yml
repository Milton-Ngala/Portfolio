image: node:22

stages:
  - install
  - build
  - deploy

variables:
  NODE_ENV: production
  PNPM_HOME: "/pnpm"
  PATH: "$PNPM_HOME:$PATH"

cache:
  key:
    files:
      - pnpm-lock.yaml
  paths:
    - .pnpm-store

before_script:
  - corepack enable
  - corepack prepare pnpm@10.11.1 --activate
  - pnpm config set store-dir .pnpm-store

install:
  stage: install
  script:
    - pnpm install --frozen-lockfile
  artifacts:
    paths:
      - node_modules
    expire_in: 1h

build:
  stage: build
  script:
    # 1. Build Next.js
    - pnpm run build

    # 2. Build Cloudflare Worker via OpenNext
    - pnpm run build:worker
  artifacts:
    paths:
      - .open-next
    expire_in: 1h

deploy:
  stage: deploy
  environment:
    name: production
  only:
    - main
  script:
    # Wrangler is already installed locally (devDependency)
    - pnpm exec wrangler deploy
